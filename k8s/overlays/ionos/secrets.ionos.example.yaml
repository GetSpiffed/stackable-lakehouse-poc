# Template voor IONOS-secrets. Nooit gevulde waarden committen naar git.
# Gebruik:
#   cp secrets.ionos.example.yaml secrets.yaml
#   # vul secrets.yaml in met echte waarden
#   kubectl apply -f secrets.yaml
#   kubectl apply -k k8s/overlays/ionos
---
apiVersion: v1
kind: Secret
metadata:
  name: ionos-s3-credentials
  namespace: data-platform
type: Opaque
stringData:
  accessKey: CHANGE_ME
  secretKey: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data-platform
type: Opaque
stringData:
  username: hive
  password: CHANGE_ME
