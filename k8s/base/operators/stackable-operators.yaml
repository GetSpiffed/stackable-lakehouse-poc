apiVersion: v1
kind: ConfigMap
metadata:
  name: stackable-operator-plan
  namespace: data-platform
  labels:
    app.kubernetes.io/name: stackable-operator-plan
data:
  description: |
    Stackable operators are installed via Helm by scripts in scripts/local/install-operators.sh
    and scripts/ionos/install-operators.sh. This ConfigMap documents the operator set used
    by this PoC.
  operators: |
    commons-operator
    secret-operator
    listener-operator
    hive-operator
    trino-operator
