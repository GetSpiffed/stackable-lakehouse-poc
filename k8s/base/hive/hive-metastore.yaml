apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-metastore
  namespace: data-platform
spec:
  image:
    productVersion: 3.1.3
  clusterConfig:
    database:
      connString: jdbc:postgresql://postgres.data-platform.svc.cluster.local:5432/metastore
      credentialsSecret: postgres-credentials
      dbType: postgres
  metastore:
    roleGroups:
      default:
        replicas: 1
